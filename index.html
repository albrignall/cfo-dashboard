<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucidelusion ERP & UC Reporter V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .ledger-row input, .ledger-row select { background: #020617; border: 1px solid #1e293b; color: #e2e8f0; font-size: 0.75rem; padding: 4px 6px; border-radius: 4px; }
        .ledger-row input:focus, .ledger-row select:focus { border-color: #10b981; outline: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen pb-24">

    <div class="bg-slate-900 border-b border-slate-800 sticky top-0 z-30 shadow-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-emerald-400 tracking-tight">LUCIDELUSION <span class="text-slate-500 font-medium">| ERP V4.0</span></h1>
                <p class="text-xs text-slate-400 mt-1">Dynamic Ledgers, DWP Reporting & Cash Drawings</p>
            </div>
            
            <div class="flex gap-4 text-xs bg-slate-950 p-3 rounded border border-slate-800">
                <div>
                    <label class="block text-slate-500 mb-1">Starting Biz (£)</label>
                    <input type="number" id="g_starling" value="2031.74" class="w-24 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white" oninput="saveAndCalc()">
                </div>
                <div>
                    <label class="block text-slate-500 mb-1">Starting Pers. (£)</label>
                    <input type="number" id="g_personal" value="4843.11" class="w-24 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white" oninput="saveAndCalc()">
                </div>
                <div>
                    <label class="block text-slate-500 mb-1">Capital Intro (£)</label>
                    <input type="number" id="g_capital" value="4500.00" class="w-24 bg-slate-800 border border-emerald-900 rounded px-2 py-1 text-emerald-400" oninput="saveAndCalc()">
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 border-t border-slate-800 p-3">
            <div class="max-w-7xl mx-auto px-6 flex flex-wrap gap-6 items-center">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="h_active" class="w-4 h-4 accent-indigo-500" onchange="toggleHousing(); saveAndCalc()">
                    <label class="font-bold text-indigo-400 uppercase tracking-wide text-xs">Enable Housing</label>
                </div>
                <div class="flex gap-4 opacity-50 transition-opacity duration-300" id="housing_controls">
                    <div>
                        <select id="h_month" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-white text-xs" onchange="saveAndCalc()">
                            <option value="5">AP6 (Sep)</option><option value="6">AP7 (Oct)</option><option value="7">AP8 (Nov)</option>
                            <option value="8">AP9 (Dec)</option><option value="9">AP10 (Jan)</option><option value="10">AP11 (Feb)</option><option value="11">AP12 (Mar)</option>
                        </select>
                    </div>
                    <div>
                        <select id="h_lha" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-white text-xs" onchange="saveAndCalc()">
                            <option value="1621">2-Bed (LHA: £1621)</option><option value="2044">3-Bed (LHA: £2044)</option>
                        </select>
                    </div>
                    <div>
                        <input type="number" id="h_rent" value="2800" placeholder="Actual Rent" class="w-20 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-rose-400 font-bold text-xs" oninput="saveAndCalc()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 mt-6">
        <div id="ap-container" class="space-y-6"></div>
    </div>

    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="exportReport()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-full shadow-lg border border-indigo-400 flex items-center gap-2 transition-transform transform hover:scale-105">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Export DWP Report
        </button>
    </div>

    <script>
        const fmt = (n) => '£' + n.toLocaleString('en-GB', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        const dwpCategories = [
            "Equipment & Hardware",
            "Stock & Raw Materials",
            "Software & Subscriptions",
            "Marketing & PR",
            "Admin & Professional Fees",
            "Travel & Transport",
            "Rent & Utilities (Business)"
        ];

        // Default Data Template
        const defaultState = {
            globals: { starling: 2031.74, personal: 4843.11, capital: 4500, h_active: false, h_month: 5, h_lha: 1621, h_rent: 2800 },
            aps: Array(12).fill(null).map((_, i) => ({
                monthName: `AP ${i+1}`,
                incomes: i === 0 ? [{desc: "Pre-booked Client", customer: "Client A", amount: 2080}] : [],
                expenses: i === 0 ? [{desc: "RTX Laptop + Admin", vendor: "Overclockers", cat: "Equipment & Hardware", amount: 2819.88}] : [],
                drawings: 0,
                persExp: 0,
                ledgerOpen: false
            }))
        };

        // Load State or Init
        let state = JSON.parse(localStorage.getItem('lucid_v4_state')) || defaultState;

        function saveState() {
            // Update globals from UI
            state.globals.starling = parseFloat(document.getElementById('g_starling').value) || 0;
            state.globals.personal = parseFloat(document.getElementById('g_personal').value) || 0;
            state.globals.capital = parseFloat(document.getElementById('g_capital').value) || 0;
            state.globals.h_active = document.getElementById('h_active').checked;
            state.globals.h_month = parseInt(document.getElementById('h_month').value);
            state.globals.h_lha = parseFloat(document.getElementById('h_lha').value) || 0;
            state.globals.h_rent = parseFloat(document.getElementById('h_rent').value) || 0;
            
            localStorage.setItem('lucid_v4_state', JSON.stringify(state));
        }

        function toggleLedger(apIndex) {
            state.aps[apIndex].ledgerOpen = !state.aps[apIndex].ledgerOpen;
            render();
        }

        // --- LEDGER MUTATIONS ---
        function addIncome(apIndex) { state.aps[apIndex].incomes.push({desc: "", customer: "", amount: 0}); render(); }
        function removeIncome(apIndex, idx) { state.aps[apIndex].incomes.splice(idx, 1); render(); }
        function updateIncome(apIndex, idx, field, val) { state.aps[apIndex].incomes[idx][field] = field === 'amount' ? (parseFloat(val)||0) : val; saveAndCalc(); }

        function addExpense(apIndex) { state.aps[apIndex].expenses.push({desc: "", vendor: "", cat: dwpCategories[0], amount: 0}); render(); }
        function removeExpense(apIndex, idx) { state.aps[apIndex].expenses.splice(idx, 1); render(); }
        function updateExpense(apIndex, idx, field, val) { state.aps[apIndex].expenses[idx][field] = field === 'amount' ? (parseFloat(val)||0) : val; saveAndCalc(); }

        function updateAPVal(apIndex, field, val) { state.aps[apIndex][field] = parseFloat(val)||0; saveAndCalc(); }

        function toggleHousing() {
            const controls = document.getElementById('housing_controls');
            if(document.getElementById('h_active').checked) controls.classList.remove('opacity-50');
            else controls.classList.add('opacity-50');
        }

        function saveAndCalc() { saveState(); render(); }

        // --- MAIN RENDER ENGINE ---
        function render() {
            // Restore UI globals
            document.getElementById('g_starling').value = state.globals.starling;
            document.getElementById('g_personal').value = state.globals.personal;
            document.getElementById('g_capital').value = state.globals.capital;
            document.getElementById('h_active').checked = state.globals.h_active;
            document.getElementById('h_month').value = state.globals.h_month;
            document.getElementById('h_lha').value = state.globals.h_lha;
            document.getElementById('h_rent').value = state.globals.h_rent;
            toggleHousing();

            const container = document.getElementById('ap-container');
            let html = '';

            const baseUC = 1051.00;
            const waHigh = 710.00;
            const waLow = 404.00;

            let curBiz = state.globals.starling + state.globals.capital;
            let curPers = state.globals.personal - state.globals.capital;
            let lossCF = 0;

            state.aps.forEach((ap, i) => {
                // Calculate Totals
                let totalInc = ap.incomes.reduce((sum, item) => sum + item.amount, 0);
                let totalExp = ap.expenses.reduce((sum, item) => sum + item.amount, 0);

                // Math Engine
                let isRenting = state.globals.h_active && (i >= state.globals.h_month);
                let housingSub = isRenting ? Math.min(state.globals.h_rent, state.globals.h_lha) : 0;
                let rentShortfall = isRenting ? Math.max(0, state.globals.h_rent - housingSub) : 0;
                
                let curWA = isRenting ? waLow : waHigh;
                let curMaxUC = baseUC + housingSub;

                let netProfit = totalInc - totalExp; // DRAWINGS DO NOT REDUCE PROFIT
                let adjProfit = Math.max(0, netProfit - lossCF);
                let newLossCF = netProfit - lossCF < 0 ? Math.abs(netProfit - lossCF) : 0;

                let deduction = Math.max(0, (adjProfit - curWA) * 0.55);
                let finalUC = Math.max(0, curMaxUC - deduction);

                // Apply Cash Moves
                curBiz = curBiz + totalInc - totalExp - ap.drawings; 
                curPers = curPers + finalUC - ap.persExp - rentShortfall + ap.drawings;

                // Build Category Options
                const catOptions = dwpCategories.map(c => `<option value="${c}">${c}</option>`).join('');

                // Build HTML
                html += `
                <div class="bg-slate-900 rounded-lg border border-slate-800 shadow-sm overflow-hidden">
                    
                    <div class="grid grid-cols-1 md:grid-cols-6 divide-y md:divide-y-0 md:divide-x divide-slate-800 bg-slate-900 relative">
                        
                        <div class="p-4 flex flex-col justify-center bg-slate-800/20">
                            <h2 class="font-bold text-slate-200 text-lg mb-1">${ap.monthName}</h2>
                            <button onclick="toggleLedger(${i})" class="text-xs w-full py-1.5 rounded border border-indigo-500/50 text-indigo-400 hover:bg-indigo-500/10 transition-colors">
                                ${ap.ledgerOpen ? 'Close Ledger' : 'Manage Ledger Data'}
                            </button>
                        </div>

                        <div class="p-4">
                            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2">Business Cashflow</h3>
                            <div class="flex justify-between text-xs mb-1"><span class="text-slate-400">Total Income:</span><span class="text-white">${fmt(totalInc)}</span></div>
                            <div class="flex justify-between text-xs mb-1"><span class="text-slate-400">Total Expenses:</span><span class="text-emerald-400">-${fmt(totalExp)}</span></div>
                            <div class="flex justify-between text-xs pt-1 border-t border-slate-800 mt-1"><span class="text-slate-400">Net Profit:</span><span class="font-bold text-white">${fmt(netProfit)}</span></div>
                        </div>

                        <div class="p-4">
                            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2">Personal Transfers</h3>
                            <div class="mb-2">
                                <label class="block text-[10px] text-slate-400 mb-0.5">Drawings (Biz to Pers) £</label>
                                <input type="number" value="${ap.drawings}" onchange="updateAPVal(${i}, 'drawings', this.value)" class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-indigo-300 text-xs">
                            </div>
                            <div>
                                <label class="block text-[10px] text-slate-400 mb-0.5">Personal Spend £</label>
                                <input type="number" value="${ap.persExp}" onchange="updateAPVal(${i}, 'persExp', this.value)" class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-amber-300 text-xs">
                            </div>
                        </div>

                        <div class="p-4 bg-slate-800/30">
                            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-2">UC Algorithm</h3>
                            <div class="flex justify-between text-[10px] mb-1"><span class="text-slate-500">Allow Limit:</span><span class="text-slate-500">${fmt(curWA)}</span></div>
                            <div class="flex justify-between text-[10px] mb-1"><span class="text-slate-400">Max UC:</span><span class="text-indigo-400">${fmt(curMaxUC)}</span></div>
                            <div class="flex justify-between text-xs mb-1"><span class="text-slate-400">55% Deduction:</span><span class="text-rose-400">-${fmt(deduction)}</span></div>
                            <div class="flex justify-between text-sm font-bold border-t border-slate-700 pt-1">
                                <span class="text-slate-300">UC Paid:</span><span class="text-emerald-400">${fmt(finalUC)}</span>
                            </div>
                        </div>

                        <div class="p-4 md:col-span-2 bg-slate-950 flex flex-col justify-center">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs text-slate-400">Starling Balance:</span>
                                <span class="text-lg font-bold text-white">${fmt(curBiz)}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-slate-400">Personal Savings:</span>
                                <div class="text-right">
                                    ${curPers >= 6000 
                                        ? `<span class="text-lg font-black text-rose-500">${fmt(curPers)}</span><br><span class="text-[9px] bg-rose-900 text-white px-1 rounded uppercase">Over £6k Limit</span>` 
                                        : `<span class="text-lg font-black text-emerald-400">${fmt(curPers)}</span>`
                                    }
                                </div>
                            </div>
                        </div>
                    </div>

                    ${ap.ledgerOpen ? `
                    <div class="border-t border-indigo-900/50 bg-slate-900/80 p-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="text-xs font-bold text-indigo-400">Income Ledger</h4>
                                    <button onclick="addIncome(${i})" class="text-[10px] bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded">+ Add Row</button>
                                </div>
                                <div class="space-y-2">
                                    ${ap.incomes.length === 0 ? '<div class="text-xs text-slate-600 italic">No income recorded.</div>' : ''}
                                    ${ap.incomes.map((inc, idx) => `
                                    <div class="ledger-row grid grid-cols-[3fr_2fr_100px_auto] gap-2 items-center">
                                        <input type="text" placeholder="Desc (e.g. Inv 246)" value="${inc.desc}" onchange="updateIncome(${i}, ${idx}, 'desc', this.value)">
                                        <input type="text" placeholder="Customer" value="${inc.customer}" onchange="updateIncome(${i}, ${idx}, 'customer', this.value)">
                                        <input type="number" placeholder="£" value="${inc.amount}" onchange="updateIncome(${i}, ${idx}, 'amount', this.value)" class="text-emerald-400 font-bold">
                                        <button onclick="removeIncome(${i}, ${idx})" class="text-rose-500 hover:text-rose-400 text-sm">×</button>
                                    </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="text-xs font-bold text-rose-400">Expense Ledger</h4>
                                    <button onclick="addExpense(${i})" class="text-[10px] bg-rose-900 hover:bg-rose-800 text-white px-2 py-1 rounded">+ Add Row</button>
                                </div>
                                <div class="space-y-2">
                                    ${ap.expenses.length === 0 ? '<div class="text-xs text-slate-600 italic">No expenses recorded.</div>' : ''}
                                    ${ap.expenses.map((exp, idx) => `
                                    <div class="ledger-row grid grid-cols-[2fr_2fr_3fr_100px_auto] gap-2 items-center">
                                        <input type="text" placeholder="Desc (e.g. Laptop)" value="${exp.desc}" onchange="updateExpense(${i}, ${idx}, 'desc', this.value)">
                                        <input type="text" placeholder="Vendor" value="${exp.vendor}" onchange="updateExpense(${i}, ${idx}, 'vendor', this.value)">
                                        <select onchange="updateExpense(${i}, ${idx}, 'cat', this.value)">
                                            ${dwpCategories.map(c => `<option value="${c}" ${exp.cat === c ? 'selected' : ''}>${c}</option>`).join('')}
                                        </select>
                                        <input type="number" placeholder="£" value="${exp.amount}" onchange="updateExpense(${i}, ${idx}, 'amount', this.value)" class="text-rose-400 font-bold">
                                        <button onclick="removeExpense(${i}, ${idx})" class="text-rose-500 hover:text-rose-400 text-sm">×</button>
                                    </div>
                                    `).join('')}
                                </div>
                            </div>

                        </div>
                    </div>
                    ` : ''}
                </div>
                `;
                lossCF = newLossCF;
            });

            container.innerHTML = html;
        }

        // --- EXPORT TO CSV FUNCTIONALITY ---
        function exportReport() {
            // Prompt user for which AP to export
            let apOptions = state.aps.map((ap, i) => `${i+1}: ${ap.monthName}`).join("\\n");
            let apChoice = prompt(`Enter the number (1-12) of the Assessment Period to export:\\n\\n${apOptions}`);
            
            let apIndex = parseInt(apChoice) - 1;
            if (isNaN(apIndex) || apIndex < 0 || apIndex > 11) {
                if(apChoice !== null) alert("Invalid selection.");
                return;
            }

            let ap = state.aps[apIndex];
            
            // Build CSV Content
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += `Universal Credit Report - ${ap.monthName}\r\n\r\n`;
            
            // Income Section
            csvContent += "INCOME\r\n";
            csvContent += "Description,Customer,Amount\r\n";
            let totalInc = 0;
            ap.incomes.forEach(inc => {
                csvContent += `"${inc.desc}","${inc.customer}",${inc.amount}\r\n`;
                totalInc += inc.amount;
            });
            csvContent += `,,TOTAL INCOME:,${totalInc}\r\n\r\n`;

            // Expenses Section
            csvContent += "EXPENSES\r\n";
            csvContent += "Category,Description,Vendor,Amount\r\n";
            let totalExp = 0;
            ap.expenses.forEach(exp => {
                csvContent += `"${exp.cat}","${exp.desc}","${exp.vendor}",${exp.amount}\r\n`;
                totalExp += exp.amount;
            });
            csvContent += `,,,TOTAL EXPENSES:,${totalExp}\r\n\r\n`;

            // Summary
            csvContent += "SUMMARY\r\n";
            csvContent += `Reported Net Profit,${totalInc - totalExp}\r\n`;
            csvContent += `Cash Drawings (Personal Transfers),${ap.drawings}\r\n`;

            // Trigger Download
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Lucidelusion_UC_Report_${ap.monthName.replace(/\s+/g, '_')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initial Boot
        render();
    </script>
</body>
</html>
